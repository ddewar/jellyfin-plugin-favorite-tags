name: Build

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore src/jellyfin-plugin-favorite-tags.csproj

    - name: Build
      run: dotnet build src/jellyfin-plugin-favorite-tags.csproj --configuration Release --no-restore

    - name: Create artifact directory
      run: mkdir -p artifacts

    - name: Copy DLL to artifacts
      run: cp src/bin/Release/net9.0/Jellyfin.Plugin.FavoriteTags.dll artifacts/

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: jellyfin-plugin-favorite-tags
        path: artifacts/
        retention-days: 30
