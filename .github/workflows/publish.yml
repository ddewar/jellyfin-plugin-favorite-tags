name: Publish

on:
  release:
    types: [ published ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Extract version from tag
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
        else
          VERSION="1.0.0.0"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Restore dependencies
      run: dotnet restore src/jellyfin-plugin-favorite-tags.csproj

    - name: Build
      run: dotnet build src/jellyfin-plugin-favorite-tags.csproj --configuration Release --no-restore

    - name: Create release directory
      run: mkdir -p release

    - name: Copy DLL to release
      run: cp src/bin/Release/net9.0/Jellyfin.Plugin.FavoriteTags.dll release/

    - name: Create ZIP archive
      run: |
        cd release
        zip jellyfin-plugin-favorite-tags-${{ steps.get_version.outputs.version }}.zip Jellyfin.Plugin.FavoriteTags.dll

    - name: Generate MD5 checksum
      run: |
        cd release
        md5sum jellyfin-plugin-favorite-tags-${{ steps.get_version.outputs.version }}.zip > jellyfin-plugin-favorite-tags-${{ steps.get_version.outputs.version }}.zip.md5

    - name: Upload release assets
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/jellyfin-plugin-favorite-tags-${{ steps.get_version.outputs.version }}.zip
          release/jellyfin-plugin-favorite-tags-${{ steps.get_version.outputs.version }}.zip.md5
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
